name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # pnpm version is pinned via the "packageManager" field in js/package.json.
      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('js/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Test
        run: pnpm test

      - name: Conformance (golden vectors vs .meta.json)
        run: pnpm run conformance

      - name: Build
        run: pnpm run build

  conformance-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Python conformance port
        run: python3 conformance/python/run.py

  conformance-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conformance/rust
    steps:
      - uses: actions/checkout@v4
      - name: Run Rust conformance port
        run: cargo test

  conformance-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conformance/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Run Go conformance port
        run: go test ./...

